<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 12: Flex Form - Mohsin</title>
    <link rel="stylesheet" href="task12.css">
</head>
<body>

    <form class="contact-form">
        <h2>Order Custom Print</h2>
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Mohsin Ali">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="mohsin@example.com">
        </div>

        <div class="form-group">
            <label>Print Details</label>
            <textarea rows="4"></textarea>
        </div>

        <button type="submit">Submit Request</button>
    </form>

</body>
</html>
